services:
  backend:
    build:
      context: ./backend
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATA_DIR: /app/data
      VOCAB_DB_PATH: /app/data/reading_helper_vocab.db
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
